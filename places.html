<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0F0D">
<title>장소별 상세 가이드 · 후쿠오카</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
:root{--bg:#0A0F0D;--card:#14201B;--card2:#1B2A24;--jade:#12B981;--jade-soft:#34D399;--jade-deep:#0F6E56;--text:#F2F7F5;--sub:#8AA79C;--line:#243A32;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg)}
body{font-family:'Pretendard Variable','Pretendard',system-ui,sans-serif;color:var(--text);letter-spacing:-.01em;line-height:1.5;
  max-width:480px;margin:0 auto;padding-bottom:40px;min-height:100vh}
.jp{font-family:'Noto Sans JP',sans-serif}
.press{transition:transform .12s ease}
.press:active{transform:scale(.97)}
/* 리턴바 */
.returnbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  height:44px;padding:0 16px;background:var(--jade-deep);color:#fff;text-decoration:none;transition:opacity .15s ease}
.returnbar:active{opacity:.85}
.rb-back{display:flex;align-items:center;gap:6px;font-size:14.5px;font-weight:800}
.rb-arrow{font-size:17px;line-height:1}
.rb-zone{font-size:12.5px;font-weight:800;opacity:.92}
/* 헤더 */
header{position:sticky;top:44px;z-index:40;background:rgba(10,15,13,.9);backdrop-filter:blur(12px);padding:18px 18px 10px}
h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
.h-sub{font-size:13px;color:var(--sub);margin-top:3px;font-weight:600}
/* 칩 */
.chips{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 6px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:9px 15px;border-radius:99px;font-size:13.5px;font-weight:800;white-space:nowrap;
  background:var(--card);color:var(--sub);border:1px solid var(--line);cursor:pointer;transition:transform .12s,background .2s,color .2s}
.chip small{font-weight:600;font-size:10.5px;opacity:.8;margin-left:4px}
.chip.on{background:var(--jade);color:#04241A;border-color:var(--jade)}
.chip:active{transform:scale(.94)}
/* 그룹 */
main{padding:6px 16px 0}
.group{display:none}
.group.show{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.g-head{font-size:14px;font-weight:800;color:var(--jade-soft);margin:14px 4px 10px;letter-spacing:.2px}
/* 카드 아코디언 */
.card{background:var(--card);border-radius:18px;border:1px solid var(--line);margin-bottom:11px;overflow:hidden}
.acc-head{width:100%;text-align:left;background:none;border:none;color:var(--text);cursor:pointer;
  display:flex;align-items:flex-start;gap:10px;padding:15px 16px;font-family:inherit}
.ah-main{flex:1;min-width:0}
.ah-title{font-size:15.5px;font-weight:800;line-height:1.35;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ah-flag{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:7px;background:rgba(18,185,129,.16);color:var(--jade-soft)}
.ah-flag.warn{background:rgba(239,124,27,.16);color:#F0A868}
.ah-flag.info{background:rgba(138,167,156,.16);color:var(--sub)}
.ah-sub{font-size:12.5px;color:var(--sub);margin-top:3px;font-weight:600}
.arrow{color:var(--sub);font-size:13px;margin-top:3px;transition:transform .3s ease;flex:0 0 auto}
.acc.open .arrow{transform:rotate(180deg);color:var(--jade)}
.t-detail-wrap{max-height:0;overflow:hidden;transition:max-height .34s ease}
.acc.open .t-detail-wrap{max-height:3000px}
.acc-body{padding:0 16px 16px;font-size:13.5px;line-height:1.62}
.b-sec{font-size:11.5px;font-weight:800;color:var(--jade-soft);margin:12px 0 5px;letter-spacing:.3px}
.b-sec:first-child{margin-top:2px}
.acc-body p{margin:4px 0}
.acc-body b{color:var(--text);font-weight:800}
.acc-body .jp{color:var(--jade-soft)}
ul.b-list{list-style:none;margin:4px 0}
ul.b-list li{position:relative;padding-left:14px;margin:5px 0;color:#D7E5DF}
ul.b-list li::before{content:'·';position:absolute;left:2px;color:var(--jade);font-weight:900}
.callout{border-radius:12px;padding:11px 13px;margin:11px 0;font-size:13px;line-height:1.6}
.callout.jade{background:rgba(18,185,129,.1);border:1px solid rgba(18,185,129,.28)}
.callout.jade .ct{color:var(--jade-soft);font-weight:800;font-size:12px;margin-bottom:3px}
.callout.warn{background:rgba(239,124,27,.1);border:1px solid rgba(239,124,27,.3)}
.callout.warn .ct{color:#F0A868;font-weight:800;font-size:12px;margin-bottom:3px}
.mapbtn{display:inline-flex;align-items:center;gap:5px;margin-top:12px;padding:9px 14px;border-radius:12px;
  background:var(--jade);color:#04241A;font-weight:800;font-size:13px;text-decoration:none}
.foot{font-size:11px;color:var(--sub);text-align:center;line-height:1.7;padding:20px 20px 8px}
</style>
</head>

const MAP = q => 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q + ' 福岡');

function render(){
  const chips = document.getElementById('chips');
  const groups = document.getElementById('groups');
  chips.innerHTML = G.map((g,i)=>`<button class="chip${i===1?' on':''}" data-g="${g.id}">${g.label}</button>`).join('');
  groups.innerHTML = G.map((g,i)=>{
    const cards = g.places.map(p=>{
      const flag = p.flag ? `<span class="ah-flag ${p.flagType||''}">${p.flag}</span>` : '';
      const map = p.q ? `<a class="mapbtn press" href="${MAP(p.q)}" target="_blank" rel="noopener">🗺️ 지도에서 보기</a>` : '';
      return `<div class="acc card">
        <button class="acc-head press" onclick="toggleAcc(this)">
          <div class="ah-main">
            <div class="ah-title">${p.emoji} ${p.name}${flag}</div>
            ${p.sub?`<div class="ah-sub">${p.sub}</div>`:''}
          </div>
          <span class="arrow">▼</span>
        </button>
        <div class="t-detail-wrap"><div class="acc-body">${p.body}${map}</div></div>
      </div>`;
    }).join('');
    return `<div class="group${i===1?' show':''}" data-g="${g.id}">
      <div class="g-head">${g.date}</div>${cards}</div>`;
  }).join('');
}
function toggleAcc(btn){ btn.parentElement.classList.toggle('open'); }
document.addEventListener('click', e=>{
  const c = e.target.closest('.chip'); if(!c) return;
  const id = c.dataset.g;
  document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on', x===c));
  document.querySelectorAll('.group').forEach(x=>x.classList.toggle('show', x.dataset.g===id));
  window.scrollTo({top:0,behavior:'smooth'});
});
render();

/* 허브 복귀 링크: 떠나온 탭(?from)으로 정확히 돌아가기 */
(function(){const from=new URLSearchParams(location.search).get('from')||'guide';
  const rb=document.getElementById('returnbar');if(rb)rb.href='index.html?tab='+from;})();
</script>
</body>
